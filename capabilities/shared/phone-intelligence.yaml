naftiko: "1.0.0-alpha1"

info:
  label: "Phone Intelligence API"
  description: "Identify carrier, line type, validity, location, and get deep insights including line status, VoIP detection, and risk scoring for any phone number globally."
  tags:
    - Abstract Api
    - Phone Intelligence
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      PHONE_INTELLIGENCE_API_KEY: PHONE_INTELLIGENCE_API_KEY

capability:
  consumes:
    - type: http
      namespace: phone-intelligence
      baseUri: https://phoneintelligence.abstractapi.com/v1
      description: "Phone Intelligence API"
      authentication:
        type: apikey
        key: api_key
        value: "{{env.PHONE_INTELLIGENCE_API_KEY}}"
        placement: query
      resources:
        - name: phone-intelligence
          path: /
          description: "Phone Intelligence API phone-intelligence resource"
          operations:
            - name: getPhoneIntelligence
              method: GET
              description: "Abstract API Get Phone Intelligence"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
