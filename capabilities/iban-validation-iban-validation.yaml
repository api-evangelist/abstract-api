naftiko: 1.0.0-alpha2
info:
  label: Abstract API - IBAN Validation API — IBAN Validation
  description: 'Abstract API - IBAN Validation API — IBAN Validation. 1 operations. Lead operation: Abstract API Validate
    IBAN. Self-contained Naftiko capability covering one Abstract Api business surface.'
  tags:
  - Abstract Api
  - IBAN Validation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ABSTRACT_API_API_KEY: ABSTRACT_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: iban-validation-iban-validation
    baseUri: https://ibanvalidation.abstractapi.com/v1
    description: Abstract API - IBAN Validation API — IBAN Validation business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: validateiban
        method: GET
        description: Abstract API Validate IBAN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: api_key
          in: query
          type: string
          description: Your unique API key for the IBAN Validation API.
          required: true
        - name: iban
          in: query
          type: string
          description: The IBAN to validate.
          required: true
    authentication:
      type: apikey
      key: api_key
      value: '{{env.ABSTRACT_API_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: iban-validation-iban-validation-rest
    port: 8080
    description: REST adapter for Abstract API - IBAN Validation API — IBAN Validation. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: GET
        name: validateiban
        description: Abstract API Validate IBAN
        call: iban-validation-iban-validation.validateiban
        with:
          api_key: rest.api_key
          iban: rest.iban
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: iban-validation-iban-validation-mcp
    port: 9090
    transport: http
    description: MCP adapter for Abstract API - IBAN Validation API — IBAN Validation. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: abstract-api-validate-iban
      description: Abstract API Validate IBAN
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: iban-validation-iban-validation.validateiban
      with:
        api_key: tools.api_key
        iban: tools.iban
      outputParameters:
      - type: object
        mapping: $.
