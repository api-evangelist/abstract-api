specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Abstract API
providerId: abstract-api
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Data Validation
  - Email Verification
  - Phone Validation
  - Geolocation
  - Enrichment
description: Abstract API is a portfolio of small per-product utility APIs (Email Reputation, Phone Intelligence,
  IP Intelligence, Company Enrichment, etc.) each priced as Free / Starter / Standard / Professional /
  Enterprise tiers with monthly request quotas. Free tier is 100 req/month at 3 req/sec; paid tiers scale
  monthly request volume from 5,000 to 150,000+ with the same 3 req/sec ceiling. 10% discount on annual
  billing.
sources:
  - https://www.abstractapi.com/api/email-verification-validation-api
  - https://docs.abstractapi.com/
plans:
  - id: abstract-api-free
    name: Free
    type: freemium
    description: 100 requests/month at 3 req/sec; per-product free tier.
    entries:
      - label: Monthly request quota
        name: free_quota
        type: quota
        metric: request
        limit: 100
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate ceiling
        name: free_rate
        type: tiered
        metric: requests_per_second
        limit: 3
        timeFrame: second
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Basic deliverability / validation checks
      - name: 3 req/sec rate ceiling
      - name: Public documentation and community support
  - id: abstract-api-starter
    name: Starter
    type: subscription
    description: Entry paid tier; from $17/month with monthly request volume from 5,000 up to 150,000
      depending on selected sub-tier.
    entries:
      - label: Plan minimum monthly
        name: starter_monthly
        type: flat
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '17.00'
        userMultiplied: false
      - label: Monthly request volume (selectable)
        name: starter_requests
        type: tiered
        metric: request
        limit: 150000
        timeFrame: month
        geo: global
        unit: 1
        price: see plan picker (5,000 to 150,000 req/mo)
        userMultiplied: false
    elements:
      - name: Email deliverability validation
      - name: Domain whitelisting
      - name: Bulk CSV upload
      - name: 3 req/sec rate ceiling
      - name: 10% off with annual billing
  - id: abstract-api-standard
    name: Standard
    type: subscription
    description: Standard tier with sender details and domain enrichment; from $37/month.
    entries:
      - label: Plan minimum monthly
        name: standard_monthly
        type: flat
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '37.00'
        userMultiplied: false
      - label: Monthly request volume (selectable)
        name: standard_requests
        type: tiered
        metric: request
        limit: 150000
        timeFrame: month
        geo: global
        unit: 1
        price: see plan picker (5,000 to 150,000 req/mo)
        userMultiplied: false
    elements:
      - name: Everything in Starter
      - name: Sender details
      - name: Domain enrichment
  - id: abstract-api-professional
    name: Professional
    type: subscription
    description: Most popular tier; from $39/month. Adds quality scores, risk assessment, breach monitoring.
    entries:
      - label: Plan minimum monthly
        name: pro_monthly
        type: flat
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '39.00'
        userMultiplied: false
      - label: Monthly request volume (selectable)
        name: pro_requests
        type: tiered
        metric: request
        limit: 150000
        timeFrame: month
        geo: global
        unit: 1
        price: see plan picker (5,000 to 150,000 req/mo)
        userMultiplied: false
    elements:
      - name: Everything in Standard
      - name: Quality scores
      - name: Risk assessment
      - name: Breach monitoring
  - id: abstract-api-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-priced tier with flexible volumes, SLA, and commercial license.
    entries:
      - label: Custom contract
        name: enterprise_contract
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Flexible request volume
      - name: Commercial license
      - name: SOC 2 / GDPR compliance documentation
      - name: Dedicated account manager
      - name: Enhanced SLA
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
