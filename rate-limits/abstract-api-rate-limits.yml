specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Abstract API
providerId: abstract-api
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Data Validation
  - Geolocation
  - Email Verification
  - Rate Limiting
description: Abstract API enforces a per-API-key rate ceiling of 3 requests per second across the Free,
  Starter, Standard, and Professional tiers. Monthly request quotas are set per plan and per selected
  volume sub-tier. Enterprise plans negotiate higher rates. Limits are scoped per API key per product.
sources:
  - https://www.abstractapi.com/api/email-verification-validation-api
  - https://docs.abstractapi.com/
responseCodes:
  throttled: 429
  quotaExceeded: 429
limits:
  - name: Free / Starter / Standard / Professional rate
    scope: api-key
    metric: requests_per_second
    limit: 3
    timeFrame: second
    notes: Same 3 req/sec ceiling applies on Free and all paid tiers below Enterprise.
  - name: Free monthly quota
    scope: api-key
    metric: requests_per_month
    limit: 100
    timeFrame: month
  - name: Starter monthly quota
    scope: api-key
    metric: requests_per_month
    limit: 150000
    timeFrame: month
    notes: Customer selects a volume sub-tier between 5,000 and 150,000 req/month at signup.
  - name: Standard monthly quota
    scope: api-key
    metric: requests_per_month
    limit: 150000
    timeFrame: month
    notes: Same volume picker as Starter; price differs by feature set.
  - name: Professional monthly quota
    scope: api-key
    metric: requests_per_month
    limit: 150000
    timeFrame: month
  - name: Enterprise rate / quota
    scope: api-key
    metric: varies
    limit: flexible — negotiated rate ceiling and monthly volume
policies:
  - name: Per-product key
    description: Each Abstract API product (Email Reputation, Phone Intelligence, IP Intelligence, Company
      Enrichment, etc.) issues its own API key; quotas and rate limits are enforced separately per product.
  - name: Quota reset
    description: Monthly request counters reset on the billing-cycle anniversary.
  - name: Throttle response
    description: Exceeding 3 req/sec returns HTTP 429; clients should back off and retry rather than burst.
  - name: Annual discount
    description: 10% discount available on annual billing; quotas remain monthly.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
